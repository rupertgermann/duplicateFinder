<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DuplicateImageFinder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&family=Comfortaa:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ── Solarpunk Theme Variables ───────────────────────── */
:root {
  /* Light mode — golden sun & lush greenery */
  --bg-app: #f4f1e8;
  --bg-toolbar: rgba(244, 237, 218, 0.82);
  --bg-toolbar-solid: #f0e9d4;
  --bg-panel: #eae4d0;
  --bg-panel-header: #ddd6be;
  --bg-surface: #faf7f0;
  --bg-surface-hover: #f0ebda;
  --bg-surface-active: #e6e0cc;
  --bg-input: #fdfcf7;
  --bg-input-focus: #fffef9;
  --bg-badge: rgba(58, 107, 53, 0.06);
  --bg-thumb: #f2ede0;
  --bg-progress-track: #ddd6be;
  --bg-action-bar: rgba(244, 237, 218, 0.85);
  --bg-status: rgba(240, 233, 212, 0.7);
  --bg-empty-icon: rgba(58, 107, 53, 0.06);

  --border-primary: rgba(90, 75, 40, 0.12);
  --border-secondary: rgba(90, 75, 40, 0.07);
  --border-input: rgba(90, 75, 40, 0.18);
  --border-input-focus: #4a8c3f;
  --border-thumb: rgba(90, 75, 40, 0.1);

  --text-primary: #2c3a2a;
  --text-secondary: #5e6e58;
  --text-tertiary: #8a9484;
  --text-muted: #b0b8aa;
  --text-on-accent: #ffffff;

  --accent: #4a8c3f;
  --accent-hover: #3d7a34;
  --accent-subtle: rgba(74, 140, 63, 0.1);
  --accent-glow: rgba(74, 140, 63, 0.25);

  --selected-bg: #4a8c3f;
  --selected-bg-hover: #3d7a34;
  --selected-text: #ffffff;

  --danger: #c45040;
  --danger-hover: #b0402f;
  --danger-subtle: rgba(196, 80, 64, 0.07);
  --danger-border: rgba(196, 80, 64, 0.18);

  --warning: #c48a20;
  --warning-subtle: rgba(196, 138, 32, 0.08);

  --btn-bg: #faf7f0;
  --btn-bg-hover: #f0ebda;
  --btn-bg-active: #e6e0cc;
  --btn-border: rgba(90, 75, 40, 0.14);
  --btn-shadow: 0 1px 3px rgba(60, 50, 20, 0.06);

  --progress-gradient: linear-gradient(90deg, #4a8c3f, #6aad5a, #d4a830, #6aad5a, #4a8c3f);
  --progress-shine: rgba(255, 255, 240, 0.4);

  --shadow-sm: 0 1px 2px rgba(60, 50, 20, 0.05);
  --shadow-md: 0 2px 8px rgba(60, 50, 20, 0.08);
  --shadow-lg: 0 4px 16px rgba(60, 50, 20, 0.1);
  --shadow-inset: inset 0 1px 2px rgba(60, 50, 20, 0.05);

  --radius-sm: 10px;
  --radius-md: 14px;
  --radius-lg: 20px;

  --toggle-bg: #c4bb9e;
  --toggle-bg-active: #4a8c3f;
  --toggle-knob: #fdfcf7;
  --toggle-icon-sun: #d4a020;
  --toggle-icon-moon: #5e7a58;

  --scrollbar-thumb: rgba(90, 75, 40, 0.18);
  --scrollbar-thumb-hover: rgba(90, 75, 40, 0.3);

  --vine-color: rgba(74, 140, 63, 0.08);
  --gold-accent: #d4a830;
  --gold-glow: rgba(212, 168, 48, 0.2);
  --leaf-pattern: rgba(74, 140, 63, 0.04);
}

[data-theme="dark"] {
  /* Dark mode — midnight garden with bioluminescence */
  --bg-app: #111a14;
  --bg-toolbar: rgba(18, 30, 22, 0.85);
  --bg-toolbar-solid: #152019;
  --bg-panel: #141e17;
  --bg-panel-header: #1a2a1e;
  --bg-surface: #172118;
  --bg-surface-hover: #1e2d20;
  --bg-surface-active: #243626;
  --bg-input: #121c15;
  --bg-input-focus: #152018;
  --bg-badge: rgba(106, 173, 90, 0.07);
  --bg-thumb: #141e17;
  --bg-progress-track: #1e2d20;
  --bg-action-bar: rgba(18, 30, 22, 0.9);
  --bg-status: rgba(17, 26, 20, 0.8);
  --bg-empty-icon: rgba(106, 173, 90, 0.05);

  --border-primary: rgba(106, 173, 90, 0.1);
  --border-secondary: rgba(106, 173, 90, 0.06);
  --border-input: rgba(106, 173, 90, 0.14);
  --border-input-focus: #6aad5a;
  --border-thumb: rgba(106, 173, 90, 0.1);

  --text-primary: #d4e0d0;
  --text-secondary: #8a9e84;
  --text-tertiary: #556e50;
  --text-muted: #3a4e38;
  --text-on-accent: #ffffff;

  --accent: #6aad5a;
  --accent-hover: #7abf6a;
  --accent-subtle: rgba(106, 173, 90, 0.12);
  --accent-glow: rgba(106, 173, 90, 0.2);

  --selected-bg: #4a8c3f;
  --selected-bg-hover: #5a9c4f;
  --selected-text: #ffffff;

  --danger: #d06050;
  --danger-hover: #e07060;
  --danger-subtle: rgba(208, 96, 80, 0.1);
  --danger-border: rgba(208, 96, 80, 0.2);

  --warning: #d4a830;
  --warning-subtle: rgba(212, 168, 48, 0.1);

  --btn-bg: #1a2a1e;
  --btn-bg-hover: #1e3022;
  --btn-bg-active: #243826;
  --btn-border: rgba(106, 173, 90, 0.1);
  --btn-shadow: 0 1px 2px rgba(0, 0, 0, 0.25);

  --progress-gradient: linear-gradient(90deg, #4a8c3f, #6aad5a, #d4a830, #6aad5a, #4a8c3f);
  --progress-shine: rgba(106, 173, 90, 0.15);

  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.25);
  --shadow-md: 0 2px 8px rgba(0, 0, 0, 0.3);
  --shadow-lg: 0 4px 16px rgba(0, 0, 0, 0.35);
  --shadow-inset: inset 0 1px 2px rgba(0, 0, 0, 0.2);

  --toggle-bg: #243626;
  --toggle-bg-active: #4a8c3f;
  --toggle-knob: #d4e0d0;
  --toggle-icon-sun: #d4a830;
  --toggle-icon-moon: #6aad5a;

  --scrollbar-thumb: rgba(106, 173, 90, 0.15);
  --scrollbar-thumb-hover: rgba(106, 173, 90, 0.25);

  --vine-color: rgba(106, 173, 90, 0.06);
  --gold-accent: #d4a830;
  --gold-glow: rgba(212, 168, 48, 0.15);
  --leaf-pattern: rgba(106, 173, 90, 0.03);
}

/* ── Base Reset ──────────────────────────────────────── */
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html, body {
  height: 100%;
  overflow: hidden;
  font-family: 'Quicksand', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  font-size: 13px;
  color: var(--text-primary);
  background: var(--bg-app);
  user-select: none;
  -webkit-user-select: none;
  transition: background 0.35s ease, color 0.35s ease;
}

/* ── App Container ───────────────────────────────────── */
#app {
  display: flex;
  flex-direction: column;
  height: 100vh;
  position: relative;
}

/* Subtle organic background pattern */
#app::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 600px 400px at 10% 90%, var(--vine-color) 0%, transparent 70%),
    radial-gradient(ellipse 500px 350px at 90% 20%, var(--gold-glow) 0%, transparent 70%),
    radial-gradient(ellipse 300px 300px at 50% 50%, var(--leaf-pattern) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
  transition: all 0.5s ease;
}

#app > * {
  position: relative;
  z-index: 1;
}

/* ── Toolbar ─────────────────────────────────────────── */
#toolbar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 14px;
  background: var(--bg-toolbar);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  border-bottom: 1px solid var(--border-primary);
  flex-shrink: 0;
  z-index: 10;
  transition: background 0.35s ease, border-color 0.35s ease;
}

#toolbar button {
  padding: 6px 16px;
  font-size: 13px;
  font-family: 'Quicksand', sans-serif;
  font-weight: 600;
  border: 1px solid var(--btn-border);
  border-radius: var(--radius-md);
  background: var(--btn-bg);
  color: var(--text-primary);
  cursor: pointer;
  white-space: nowrap;
  box-shadow: var(--btn-shadow);
  transition: all 0.15s ease;
  letter-spacing: -0.01em;
}

#toolbar button:hover:not(:disabled) {
  background: var(--btn-bg-hover);
  border-color: var(--border-input);
  box-shadow: var(--shadow-md);
  transform: translateY(-0.5px);
}

#toolbar button:active:not(:disabled) {
  background: var(--btn-bg-active);
  transform: translateY(0);
  box-shadow: var(--shadow-sm);
}

#toolbar button:disabled {
  opacity: 0.4;
  cursor: default;
}

#btnScan {
  background: linear-gradient(135deg, var(--accent), #5a9c4f, var(--gold-accent)) !important;
  background-size: 200% 200% !important;
  color: var(--text-on-accent) !important;
  border-color: transparent !important;
  animation: scanBtnShimmer 4s ease infinite;
  text-shadow: 0 1px 2px rgba(0, 0, 0, 0.15);
}

@keyframes scanBtnShimmer {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}

#btnScan:hover:not(:disabled) {
  background: linear-gradient(135deg, var(--accent-hover), #4a8c3f, #c49a20) !important;
  background-size: 200% 200% !important;
  box-shadow: 0 3px 16px var(--accent-glow), 0 2px 8px var(--gold-glow) !important;
}

#btnScan:active:not(:disabled) {
  background: var(--accent) !important;
}

#folderInput {
  flex: 1;
  padding: 6px 12px;
  font-size: 13px;
  font-family: 'Space Mono', 'SF Mono', monospace;
  font-weight: 400;
  letter-spacing: -0.02em;
  border: 1px solid var(--border-input);
  border-radius: var(--radius-md);
  background: var(--bg-input);
  color: var(--text-primary);
  outline: none;
  min-width: 100px;
  box-shadow: var(--shadow-inset);
  transition: all 0.2s ease;
}

#folderInput::placeholder {
  color: var(--text-tertiary);
  font-family: 'Quicksand', sans-serif;
  font-style: normal;
}

#folderInput:focus {
  border-color: var(--border-input-focus);
  box-shadow: 0 0 0 3px var(--accent-glow), 0 0 12px var(--gold-glow);
  background: var(--bg-input-focus);
}

/* ── Theme Toggle ────────────────────────────────────── */
.theme-toggle-wrapper {
  display: flex;
  align-items: center;
  margin-left: 4px;
  padding-left: 12px;
  border-left: 1px solid var(--gold-accent);
  border-left-style: dotted;
  opacity: 0.9;
}

.theme-toggle-control {
  position: relative;
  display: inline-flex;
  align-items: center;
  width: 52px;
  height: 28px;
  flex-shrink: 0;
}

.theme-toggle {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  cursor: pointer;
  -webkit-appearance: none;
  appearance: none;
  border: none;
  outline: none;
  background: var(--toggle-bg);
  border-radius: 14px;
  transition: background 0.3s ease;
  flex-shrink: 0;
}

.theme-toggle::before {
  content: '';
  position: absolute;
  top: 3px;
  left: 3px;
  width: 22px;
  height: 22px;
  border-radius: 50%;
  background: var(--toggle-knob);
  box-shadow: 0 1px 4px rgba(0, 0, 0, 0.15);
  transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

.theme-toggle.active {
  background: var(--toggle-bg-active);
}

.theme-toggle.active::before {
  transform: translateX(24px);
}

.theme-toggle-icons {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 7px;
  pointer-events: none;
  font-size: 12px;
}

.theme-toggle-icons .icon-sun {
  opacity: 1;
  transition: opacity 0.25s ease;
  line-height: 1;
  width: 14px;
  text-align: center;
}

.theme-toggle-icons .icon-moon {
  opacity: 1;
  padding-top: 1px;
  line-height: 1;
  width: 14px;
  text-align: center;
}

.theme-toggle.active + .theme-toggle-icons .icon-sun {
  opacity: 0.4;
}

.theme-toggle.active + .theme-toggle-icons .icon-moon {
  opacity: 1;
  color: var(--text-secondary);
}

/* ── Main Layout ─────────────────────────────────────── */
#main {
  display: flex;
  flex: 1;
  overflow: hidden;
  min-height: 0;
}

/* ── Left Panel ──────────────────────────────────────── */
#leftPanel {
  width: 260px;
  min-width: 260px;
  display: flex;
  flex-direction: column;
  background: var(--bg-panel);
  border-right: 1px solid var(--border-primary);
  transition: background 0.35s ease, border-color 0.35s ease;
}

#leftPanel .panel-header {
  padding: 10px 14px;
  font-family: 'Comfortaa', sans-serif;
  font-weight: 700;
  font-size: 11px;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.12em;
  border-bottom: 1px solid var(--border-primary);
  background: var(--bg-panel-header);
  transition: all 0.35s ease;
}

#groupList {
  flex: 1;
  overflow-y: auto;
  list-style: none;
  padding: 4px;
}

#groupList li {
  padding: 9px 12px;
  cursor: pointer;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 500;
  margin-bottom: 2px;
  color: var(--text-primary);
  transition: all 0.2s ease;
  border-left: 3px solid transparent;
}

#groupList li:hover {
  background: var(--bg-surface-hover);
  border-left-color: var(--gold-accent);
}

#groupList li.selected {
  background: var(--selected-bg);
  color: var(--selected-text);
  box-shadow: 0 2px 8px var(--accent-glow);
  border-left-color: var(--gold-accent);
}

#groupList li.selected:hover {
  background: var(--selected-bg-hover);
}

#groupNav {
  display: flex;
  gap: 6px;
  padding: 10px;
  border-top: 1px solid var(--border-primary);
  background: var(--bg-panel-header);
  transition: all 0.35s ease;
}

#groupNav button {
  flex: 1;
  padding: 6px 12px;
  font-size: 12px;
  font-family: 'Quicksand', sans-serif;
  font-weight: 600;
  border: 1px solid var(--btn-border);
  border-radius: var(--radius-sm);
  background: var(--btn-bg);
  color: var(--text-primary);
  cursor: pointer;
  box-shadow: var(--btn-shadow);
  transition: all 0.15s ease;
}

#groupNav button:hover:not(:disabled) {
  background: var(--btn-bg-hover);
  border-color: var(--border-input);
}

#groupNav button:disabled {
  opacity: 0.35;
  cursor: default;
}

/* ── Right Panel ─────────────────────────────────────── */
#rightPanel {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--bg-surface);
  transition: background 0.35s ease;
}

#imageArea {
  flex: 1;
  overflow-y: auto;
  padding: 16px 20px;
}

.image-row {
  display: flex;
  align-items: flex-start;
  gap: 16px;
  padding: 16px 0;
  animation: rowFadeIn 0.3s ease both;
}

@keyframes rowFadeIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

.image-row + .image-row {
  border-top: 1px solid var(--border-secondary);
}

.image-row input[type="checkbox"] {
  margin-top: 6px;
  width: 18px;
  height: 18px;
  flex-shrink: 0;
  cursor: pointer;
  accent-color: var(--accent);
  border-radius: 4px;
}

.thumb-container {
  width: 220px;
  height: 220px;
  min-width: 220px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg-thumb);
  border: 1px solid var(--border-thumb);
  border-radius: 24px 8px 24px 8px;
  overflow: hidden;
  transition: all 0.25s ease;
  box-shadow: var(--shadow-sm);
}

.thumb-container:hover {
  box-shadow: 0 4px 20px var(--accent-glow);
  border-color: var(--accent);
  border-radius: 8px 24px 8px 24px;
}

.thumb-container img {
  max-width: 220px;
  max-height: 220px;
  object-fit: contain;
  transition: transform 0.25s ease;
}

.thumb-container:hover img {
  transform: scale(1.02);
}

.thumb-placeholder {
  color: var(--text-muted);
  font-size: 12px;
  font-style: italic;
}

.file-info {
  flex: 1;
  min-width: 0;
  padding-top: 2px;
}

.file-name {
  font-family: 'Comfortaa', sans-serif;
  font-weight: 700;
  font-size: 15px;
  margin-bottom: 4px;
  word-break: break-all;
  color: var(--text-primary);
  letter-spacing: 0.01em;
}

.file-path {
  color: var(--text-tertiary);
  font-size: 12px;
  font-family: 'Space Mono', monospace;
  letter-spacing: -0.02em;
  margin-bottom: 6px;
  word-break: break-all;
  line-height: 1.5;
}

.file-meta {
  font-size: 12px;
  color: var(--text-secondary);
  margin-bottom: 12px;
  line-height: 1.5;
}

.file-actions {
  display: flex;
  gap: 8px;
}

.file-actions button {
  padding: 5px 14px;
  font-size: 12px;
  font-family: 'Quicksand', sans-serif;
  font-weight: 600;
  border: 1px solid var(--btn-border);
  border-radius: var(--radius-sm);
  background: var(--btn-bg);
  color: var(--text-primary);
  cursor: pointer;
  box-shadow: var(--btn-shadow);
  transition: all 0.15s ease;
}

.file-actions button:hover {
  background: var(--btn-bg-hover);
  border-color: var(--border-input);
  transform: translateY(-0.5px);
  box-shadow: var(--shadow-md);
}

.file-actions button:active {
  transform: translateY(0);
  background: var(--btn-bg-active);
}

/* ── Empty State ─────────────────────────────────────── */
#emptyState {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: var(--text-tertiary);
  font-size: 15px;
  gap: 16px;
  animation: emptyFadeIn 0.5s ease both;
}

@keyframes emptyFadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.empty-icon {
  width: 80px;
  height: 80px;
  border-radius: 28px 12px 28px 12px;
  background: linear-gradient(135deg, var(--accent-subtle), var(--gold-glow));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 36px;
  margin-bottom: 4px;
  box-shadow: 0 4px 24px var(--accent-glow);
}

.empty-text {
  font-family: 'Comfortaa', sans-serif;
  font-size: 17px;
  font-weight: 700;
  color: var(--text-secondary);
  letter-spacing: 0.02em;
}

.empty-hint {
  font-size: 13px;
  color: var(--text-tertiary);
  font-weight: 400;
}

/* ── Action Bar ──────────────────────────────────────── */
#actionBar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 16px;
  border-top: 1px solid var(--border-primary);
  background: var(--bg-action-bar);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  flex-shrink: 0;
  transition: all 0.35s ease;
}

#actionBar button {
  padding: 6px 14px;
  font-size: 12px;
  font-family: 'Quicksand', sans-serif;
  font-weight: 600;
  border: 1px solid var(--btn-border);
  border-radius: var(--radius-sm);
  background: var(--btn-bg);
  color: var(--text-primary);
  cursor: pointer;
  white-space: nowrap;
  box-shadow: var(--btn-shadow);
  transition: all 0.15s ease;
}

#actionBar button:hover {
  background: var(--btn-bg-hover);
  border-color: var(--border-input);
  transform: translateY(-0.5px);
}

#actionBar button:active {
  transform: translateY(0);
  background: var(--btn-bg-active);
}

#actionBar .separator {
  width: 1px;
  height: 24px;
  background: linear-gradient(to bottom, transparent, var(--gold-accent), transparent);
  opacity: 0.3;
  margin: 0 4px;
  flex-shrink: 0;
}

#btnTrash {
  color: var(--gold-accent) !important;
  background: rgba(212, 168, 48, 0.08) !important;
  border-color: transparent !important;
}

#btnTrash:hover {
  background: rgba(212, 168, 48, 0.12) !important;
  border-color: var(--gold-accent) !important;
  box-shadow: 0 2px 8px var(--gold-glow) !important;
}

#btnDelete {
  color: var(--danger) !important;
  background: var(--danger-subtle) !important;
  border-color: var(--danger-border) !important;
}

#btnDelete:hover {
  background: var(--danger-subtle) !important;
  border-color: var(--danger) !important;
  box-shadow: 0 2px 8px rgba(229, 77, 66, 0.12) !important;
}

/* ── Status Bar ──────────────────────────────────────── */
#statusBar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 14px;
  border-top: 1px solid var(--border-primary);
  background: var(--bg-status);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  flex-shrink: 0;
  height: 32px;
  transition: all 0.35s ease;
}

#statusText {
  font-size: 12px;
  font-family: 'Space Mono', monospace;
  color: var(--text-secondary);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  flex: 1;
  margin-right: 16px;
  font-weight: 400;
}

#progressContainer {
  width: 180px;
  min-width: 180px;
  height: 6px;
  background: var(--bg-progress-track);
  border-radius: 3px;
  overflow: hidden;
  transition: background 0.35s ease;
}

#progressBar {
  height: 100%;
  width: 0%;
  background: var(--progress-gradient);
  background-size: 400% 100%;
  border-radius: 3px;
  transition: width 0.2s ease;
  position: relative;
  animation: progressShimmer 3s ease infinite;
}

@keyframes progressShimmer {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

/* ── Scrollbar Styling ───────────────────────────────── */
::-webkit-scrollbar {
  width: 7px;
}

::-webkit-scrollbar-track {
  background: transparent;
}

::-webkit-scrollbar-thumb {
  background: var(--scrollbar-thumb);
  border-radius: 4px;
}

::-webkit-scrollbar-thumb:hover {
  background: var(--scrollbar-thumb-hover);
}

/* ── Focus-visible for accessibility ─────────────────── */
button:focus-visible,
input:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
}

/* ── Smooth all theme transitions ────────────────────── */
#leftPanel, #rightPanel, #toolbar, #statusBar, #actionBar,
#leftPanel .panel-header, #groupNav, #groupList li,
.thumb-container, .file-name, .file-path, .file-meta,
.file-actions button, #groupNav button, #actionBar button,
#toolbar button, #folderInput, #statusText, #progressContainer,
.theme-toggle-wrapper {
  transition-property: background, border-color, color, box-shadow;
  transition-duration: 0.35s;
  transition-timing-function: ease;
}

/* ── Solarpunk decorative vine accents ───────────────── */
#leftPanel::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg,
    transparent,
    var(--accent) 20%,
    var(--gold-accent) 50%,
    var(--accent) 80%,
    transparent
  );
  opacity: 0.3;
  pointer-events: none;
}

#leftPanel {
  position: relative;
}

/* Organic image row hover with golden glow */
.image-row:hover {
  background: var(--leaf-pattern);
  border-radius: var(--radius-md);
}

/* Retro-futuristic checkbox styling */
.image-row input[type="checkbox"] {
  accent-color: var(--accent);
  border-radius: 50%;
}
</style>
</head>
<body>

<div id="app">
  <!-- Toolbar -->
  <div id="toolbar">
    <button id="btnChooseFolder" type="button">Choose Folder...</button>
    <input type="text" id="folderInput" placeholder="Select a folder to scan for duplicates...">
    <button id="btnScan" type="button">Scan</button>
    <button id="btnCancel" type="button" disabled>Cancel</button>
    <div class="theme-toggle-wrapper">
      <div class="theme-toggle-control">
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode" type="button"></button>
        <div class="theme-toggle-icons">
          <span class="icon-sun">&#127774;</span>
          <span class="icon-moon">&#127763;</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Main area -->
  <div id="main">
    <!-- Left panel: group list -->
    <div id="leftPanel">
      <div class="panel-header">Duplicate Groups</div>
      <ul id="groupList"></ul>
      <div id="groupNav">
        <button id="btnPrev" type="button" disabled>&#9664; Prev</button>
        <button id="btnNext" type="button" disabled>&#9654; Next</button>
      </div>
    </div>

    <!-- Right panel: image detail -->
    <div id="rightPanel">
      <div id="imageArea">
        <div id="emptyState">
          <div class="empty-icon">&#127793;</div>
          <div class="empty-text">Find Duplicate Images</div>
          <div class="empty-hint">Choose a folder and scan to discover duplicates</div>
        </div>
      </div>
      <div id="actionBar" style="display:none;">
        <button id="btnSelectAllExceptFirst" type="button">Select All Except First</button>
        <button id="btnSelectAllExceptLargest" type="button">Select All Except Largest</button>
        <button id="btnDeselectAll" type="button">Deselect All</button>
        <div class="separator"></div>
        <button id="btnTrash" type="button">Move to Trash</button>
        <button id="btnDelete" type="button">Delete Permanently</button>
      </div>
    </div>
  </div>

  <!-- Status bar -->
  <div id="statusBar">
    <span id="statusText">Ready</span>
    <div id="progressContainer">
      <div id="progressBar"></div>
    </div>
  </div>
</div>

<script>
(function() {
  // ── Theme ───────────────────────────────────────────────
  var themeToggle = document.getElementById('themeToggle');

  function getPreferredTheme() {
    var stored = localStorage.getItem('theme');
    if (stored === 'dark' || stored === 'light') return stored;
    return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  }

  function applyTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    if (theme === 'dark') {
      themeToggle.classList.add('active');
    } else {
      themeToggle.classList.remove('active');
    }
  }

  applyTheme(getPreferredTheme());

  themeToggle.addEventListener('click', function() {
    var current = document.documentElement.getAttribute('data-theme') || 'light';
    var next = current === 'dark' ? 'light' : 'dark';
    localStorage.setItem('theme', next);
    applyTheme(next);
  });

  // Listen for OS theme changes
  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(e) {
    if (!localStorage.getItem('theme')) {
      applyTheme(e.matches ? 'dark' : 'light');
    }
  });

  // ── State ──────────────────────────────────────────────
  var groups = [];
  var currentGroupIndex = -1;
  var scanning = false;
  var cancelled = false;
  var destructiveActionPending = false;
  var thumbnailCache = {};

  // ── DOM refs ───────────────────────────────────────────
  var btnChooseFolder = document.getElementById('btnChooseFolder');
  var folderInput = document.getElementById('folderInput');
  var btnScan = document.getElementById('btnScan');
  var btnCancel = document.getElementById('btnCancel');
  var groupListEl = document.getElementById('groupList');
  var btnPrev = document.getElementById('btnPrev');
  var btnNext = document.getElementById('btnNext');
  var imageArea = document.getElementById('imageArea');
  var actionBar = document.getElementById('actionBar');
  var emptyState = document.getElementById('emptyState');
  var btnSelectAllExceptFirst = document.getElementById('btnSelectAllExceptFirst');
  var btnSelectAllExceptLargest = document.getElementById('btnSelectAllExceptLargest');
  var btnDeselectAll = document.getElementById('btnDeselectAll');
  var btnTrash = document.getElementById('btnTrash');
  var btnDelete = document.getElementById('btnDelete');
  var statusText = document.getElementById('statusText');
  var progressBar = document.getElementById('progressBar');

  // ── Tauri API shortcuts ────────────────────────────────
  function invoke(cmd, args) {
    return window.__TAURI__.core.invoke(cmd, args);
  }

  function listen(event, handler) {
    return window.__TAURI__.event.listen(event, handler);
  }

  function isPromiseLike(value) {
    return !!value && typeof value.then === 'function';
  }

  async function requestConfirmation(message, options) {
    var result;
    var dialogApi = window.__TAURI__ && window.__TAURI__.dialog;

    if (dialogApi && typeof dialogApi.confirm === 'function') {
      result = dialogApi.confirm(message, options || {});
    } else if (typeof window.confirm === 'function') {
      result = window.confirm(message);
    } else {
      return false;
    }

    if (isPromiseLike(result)) {
      result = await result;
    }

    return !!result;
  }

  function setDestructiveActionPending(pending) {
    destructiveActionPending = pending;
    btnTrash.disabled = pending;
    btnDelete.disabled = pending;
    btnSelectAllExceptFirst.disabled = pending;
    btnSelectAllExceptLargest.disabled = pending;
    btnDeselectAll.disabled = pending;
  }

  function getFailedPaths(paths, errors) {
    var failedPaths = [];
    var errorList = Array.isArray(errors) ? errors : [];

    for (var i = 0; i < paths.length; i++) {
      var path = paths[i];
      for (var j = 0; j < errorList.length; j++) {
        if (typeof errorList[j] === 'string' && errorList[j].indexOf(path + ': ') === 0) {
          failedPaths.push(path);
          break;
        }
      }
    }

    return failedPaths;
  }

  function getSucceededPaths(paths, result) {
    var failedPaths = getFailedPaths(paths, result && result.errors);
    var failedPathSet = {};
    var succeededPaths = [];

    for (var i = 0; i < failedPaths.length; i++) {
      failedPathSet[failedPaths[i]] = true;
    }

    for (var j = 0; j < paths.length; j++) {
      if (!failedPathSet[paths[j]]) {
        succeededPaths.push(paths[j]);
      }
    }

    return succeededPaths;
  }

  function formatFileCount(count) {
    return count + ' file' + (count !== 1 ? 's' : '');
  }

  function buildActionStatus(config, totalPaths, result) {
    var errorCount = result && Array.isArray(result.errors) ? result.errors.length : 0;
    var succeeded = result && typeof result.succeeded === 'number'
      ? result.succeeded
      : Math.max(0, totalPaths - errorCount);

    if (errorCount === 0) {
      return config.successMessage(succeeded);
    }

    if (succeeded === 0) {
      return 'Unable to ' + config.actionLabel + ' ' + formatFileCount(totalPaths) + '. ' + result.errors[0];
    }

    return config.partialMessage(succeeded, totalPaths, errorCount);
  }

  async function handleDestructiveAction(event, config) {
    event.preventDefault();
    event.stopPropagation();

    if (destructiveActionPending) {
      return;
    }

    var paths = getSelectedPaths();
    if (paths.length === 0) {
      setStatus('No files selected.');
      return;
    }

    setDestructiveActionPending(true);

    try {
      var confirmed = await requestConfirmation(config.confirmMessage(paths.length), config.confirmOptions);
      if (!confirmed) {
        setStatus(config.cancelMessage || 'Action cancelled.');
        return;
      }

      var result = await invoke(config.command, { paths: paths });
      var succeededPaths = getSucceededPaths(paths, result);

      if (succeededPaths.length > 0) {
        removeDeletedFiles(succeededPaths);
      }

      setStatus(buildActionStatus(config, paths.length, result || {}));
    } catch (e) {
      setStatus('Error ' + config.errorLabel + ': ' + (e.message || e));
    } finally {
      setDestructiveActionPending(false);
    }
  }

  // ── Choose folder ──────────────────────────────────────
  btnChooseFolder.addEventListener('click', async function() {
    try {
      var selected = await window.__TAURI__.dialog.open({
        directory: true,
        title: 'Select folder to scan'
      });
      if (selected) {
        folderInput.value = selected;
      }
    } catch (e) {
      console.error('Folder dialog error:', e);
    }
  });

  // ── Scan ───────────────────────────────────────────────
  btnScan.addEventListener('click', async function() {
    var folder = folderInput.value.trim();
    if (!folder) {
      setStatus('Please select a folder first.');
      return;
    }

    scanning = true;
    cancelled = false;
    btnScan.disabled = true;
    btnCancel.disabled = false;
    groups = [];
    currentGroupIndex = -1;
    thumbnailCache = {};
    renderGroupList();
    renderImages();
    setStatus('Scanning...');
    setProgress(0);

    try {
      var result = await invoke('scan_folder', { folder: folder });
      if (cancelled) {
        setStatus('Scan cancelled.');
      } else if (result && result.groups && result.groups.length > 0) {
        groups = result.groups;
        setStatus('Found ' + groups.length + ' duplicate group' + (groups.length !== 1 ? 's' : '') + '.');
        renderGroupList();
        selectGroup(0);
      } else {
        groups = [];
        setStatus('No duplicates found.');
        renderGroupList();
        renderImages();
      }
    } catch (e) {
      if (!cancelled) {
        setStatus('Error: ' + (e.message || e));
      } else {
        setStatus('Scan cancelled.');
      }
    } finally {
      scanning = false;
      btnScan.disabled = false;
      btnCancel.disabled = true;
      setProgress(0);
    }
  });

  // ── Cancel ─────────────────────────────────────────────
  btnCancel.addEventListener('click', function() {
    if (!scanning || cancelled) {
      return;
    }

    cancelled = true;
    btnCancel.disabled = true;
    setStatus('Cancelling...');
    invoke('cancel_scan').catch(function() {});
  });

  // ── Progress events ────────────────────────────────────
  listen('scan-progress', function(event) {
    if (cancelled) {
      return;
    }

    var payload = event.payload;
    if (payload.message) {
      setStatus(payload.message);
    }
    if (typeof payload.fraction === 'number') {
      setProgress(payload.fraction);
    }
  });

  // ── Group list ─────────────────────────────────────────
  function renderGroupList() {
    groupListEl.innerHTML = '';
    for (var i = 0; i < groups.length; i++) {
      var li = document.createElement('li');
      li.textContent = 'Group ' + (i + 1) + ' (' + groups[i].files.length + ' files)';
      if (i === currentGroupIndex) {
        li.className = 'selected';
      }
      li.addEventListener('click', (function(idx) {
        return function() { selectGroup(idx); };
      })(i));
      groupListEl.appendChild(li);
    }
    updateNavButtons();
  }

  function selectGroup(index) {
    if (index < 0 || index >= groups.length) return;
    currentGroupIndex = index;
    renderGroupList();
    renderImages();
    var items = groupListEl.querySelectorAll('li');
    if (items[index]) {
      items[index].scrollIntoView({ block: 'nearest' });
    }
  }

  function updateNavButtons() {
    btnPrev.disabled = currentGroupIndex <= 0;
    btnNext.disabled = currentGroupIndex < 0 || currentGroupIndex >= groups.length - 1;
  }

  btnPrev.addEventListener('click', function() {
    if (currentGroupIndex > 0) selectGroup(currentGroupIndex - 1);
  });

  btnNext.addEventListener('click', function() {
    if (currentGroupIndex < groups.length - 1) selectGroup(currentGroupIndex + 1);
  });

  // ── Image rendering ────────────────────────────────────
  function renderImages() {
    imageArea.innerHTML = '';

    if (currentGroupIndex < 0 || currentGroupIndex >= groups.length) {
      actionBar.style.display = 'none';
      var wrapper = document.createElement('div');
      wrapper.id = 'emptyState';

      var icon = document.createElement('div');
      icon.className = 'empty-icon';
      icon.innerHTML = '&#127793;';
      wrapper.appendChild(icon);

      var text = document.createElement('div');
      text.className = 'empty-text';
      var hint = document.createElement('div');
      hint.className = 'empty-hint';

      if (groups.length === 0) {
        text.textContent = 'Find Duplicate Images';
        hint.textContent = 'Choose a folder and scan to discover duplicates';
      } else {
        text.textContent = 'Select a Group';
        hint.textContent = 'Pick a duplicate group from the list to review';
      }

      wrapper.appendChild(text);
      wrapper.appendChild(hint);
      imageArea.appendChild(wrapper);
      return;
    }

    actionBar.style.display = 'flex';
    var files = groups[currentGroupIndex].files;

    for (var i = 0; i < files.length; i++) {
      var file = files[i];
      var row = document.createElement('div');
      row.className = 'image-row';
      row.dataset.index = i;
      row.style.animationDelay = (i * 0.04) + 's';

      // Checkbox
      var cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.dataset.index = i;
      row.appendChild(cb);

      // Thumbnail
      var thumbContainer = document.createElement('div');
      thumbContainer.className = 'thumb-container';
      var placeholder = document.createElement('span');
      placeholder.className = 'thumb-placeholder';
      placeholder.textContent = 'Loading...';
      thumbContainer.appendChild(placeholder);
      row.appendChild(thumbContainer);

      loadThumbnail(file.path, thumbContainer);

      // File info
      var info = document.createElement('div');
      info.className = 'file-info';

      var nameEl = document.createElement('div');
      nameEl.className = 'file-name';
      nameEl.textContent = file.name;
      info.appendChild(nameEl);

      var pathEl = document.createElement('div');
      pathEl.className = 'file-path';
      pathEl.textContent = file.path;
      info.appendChild(pathEl);

      var metaEl = document.createElement('div');
      metaEl.className = 'file-meta';
      var dims = file.dimensions || 'Unknown';
      var size = file.size || 'Unknown';
      var modified = file.modified || 'Unknown';
      metaEl.textContent = dims + '  \u00B7  ' + size + '  \u00B7  ' + modified;
      info.appendChild(metaEl);

      var actions = document.createElement('div');
      actions.className = 'file-actions';

      var btnOpen = document.createElement('button');
      btnOpen.type = 'button';
      btnOpen.textContent = 'Open';
      btnOpen.addEventListener('click', (function(p) {
        return function() {
          invoke('open_file', { path: p }).catch(function(e) {
            setStatus('Error opening file: ' + e);
          });
        };
      })(file.path));
      actions.appendChild(btnOpen);

      var btnReveal = document.createElement('button');
      btnReveal.type = 'button';
      btnReveal.textContent = 'Show in Folder';
      btnReveal.addEventListener('click', (function(p) {
        return function() {
          invoke('reveal_file', { path: p }).catch(function(e) {
            setStatus('Error revealing file: ' + e);
          });
        };
      })(file.path));
      actions.appendChild(btnReveal);

      info.appendChild(actions);
      row.appendChild(info);
      imageArea.appendChild(row);
    }
  }

  async function loadThumbnail(path, container) {
    if (thumbnailCache[path]) {
      setThumbnailImage(container, thumbnailCache[path]);
      return;
    }
    try {
      var dataUrl = await invoke('get_thumbnail', { path: path });
      thumbnailCache[path] = dataUrl;
      setThumbnailImage(container, dataUrl);
    } catch (e) {
      container.innerHTML = '';
      var span = document.createElement('span');
      span.className = 'thumb-placeholder';
      span.textContent = 'No preview';
      container.appendChild(span);
    }
  }

  function setThumbnailImage(container, dataUrl) {
    container.innerHTML = '';
    var img = document.createElement('img');
    img.src = dataUrl;
    img.alt = 'Thumbnail';
    container.appendChild(img);
  }

  // ── Selection actions ──────────────────────────────────
  function getCheckboxes() {
    return imageArea.querySelectorAll('input[type="checkbox"]');
  }

  btnSelectAllExceptFirst.addEventListener('click', function() {
    var cbs = getCheckboxes();
    for (var i = 0; i < cbs.length; i++) {
      cbs[i].checked = (i !== 0);
    }
  });

  btnSelectAllExceptLargest.addEventListener('click', function() {
    if (currentGroupIndex < 0) return;
    var files = groups[currentGroupIndex].files;
    var largestIdx = 0;
    var largestSize = -1;
    for (var i = 0; i < files.length; i++) {
      if (files[i].size_bytes > largestSize) {
        largestSize = files[i].size_bytes;
        largestIdx = i;
      }
    }
    var cbs = getCheckboxes();
    for (var i = 0; i < cbs.length; i++) {
      cbs[i].checked = (i !== largestIdx);
    }
  });

  btnDeselectAll.addEventListener('click', function() {
    var cbs = getCheckboxes();
    for (var i = 0; i < cbs.length; i++) {
      cbs[i].checked = false;
    }
  });

  // ── Destructive actions ────────────────────────────────
  function getSelectedPaths() {
    var paths = [];
    if (currentGroupIndex < 0) return paths;
    var files = groups[currentGroupIndex].files;
    var cbs = getCheckboxes();
    for (var i = 0; i < cbs.length; i++) {
      if (cbs[i].checked) {
        paths.push(files[i].path);
      }
    }
    return paths;
  }

  function removeDeletedFiles(deletedPaths) {
    var pathSet = {};
    for (var i = 0; i < deletedPaths.length; i++) {
      pathSet[deletedPaths[i]] = true;
    }

    if (currentGroupIndex >= 0 && currentGroupIndex < groups.length) {
      groups[currentGroupIndex].files = groups[currentGroupIndex].files.filter(function(f) {
        return !pathSet[f.path];
      });

      if (groups[currentGroupIndex].files.length < 2) {
        groups.splice(currentGroupIndex, 1);
        if (groups.length === 0) {
          currentGroupIndex = -1;
        } else if (currentGroupIndex >= groups.length) {
          currentGroupIndex = groups.length - 1;
        }
      }
    }

    for (var i = 0; i < deletedPaths.length; i++) {
      delete thumbnailCache[deletedPaths[i]];
    }

    renderGroupList();
    renderImages();
  }

  btnTrash.addEventListener('click', function(event) {
    handleDestructiveAction(event, {
      command: 'trash_files',
      actionLabel: 'move to Trash',
      errorLabel: 'moving files to Trash',
      confirmOptions: {
        title: 'Move to Trash'
      },
      confirmMessage: function(count) {
        return 'Move ' + formatFileCount(count) + ' to Trash?';
      },
      cancelMessage: 'Move to Trash cancelled.',
      successMessage: function(count) {
        return 'Moved ' + formatFileCount(count) + ' to Trash.';
      },
      partialMessage: function(succeeded, total, failed) {
        return 'Moved ' + formatFileCount(succeeded) + ' to Trash. ' + failed + ' of ' + total + ' failed.';
      }
    });
  });

  btnDelete.addEventListener('click', function(event) {
    handleDestructiveAction(event, {
      command: 'delete_files',
      actionLabel: 'permanently delete',
      errorLabel: 'deleting files',
      confirmOptions: {
        title: 'Delete Permanently'
      },
      confirmMessage: function(count) {
        return 'PERMANENTLY DELETE ' + formatFileCount(count) + '?\n\nThis action CANNOT be undone. The files will be permanently removed from disk.';
      },
      cancelMessage: 'Permanent delete cancelled.',
      successMessage: function(count) {
        return 'Permanently deleted ' + formatFileCount(count) + '.';
      },
      partialMessage: function(succeeded, total, failed) {
        return 'Permanently deleted ' + formatFileCount(succeeded) + '. ' + failed + ' of ' + total + ' failed.';
      }
    });
  });

  // ── Status & progress ─────────────────────────────────
  function setStatus(msg) {
    statusText.textContent = msg;
  }

  function setProgress(fraction) {
    progressBar.style.width = Math.round(fraction * 100) + '%';
  }
})();
</script>
</body>
</html>
