<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DuplicateImageFinder</title>
<style>
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html, body {
  height: 100%;
  overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  font-size: 13px;
  color: #333;
  background: #f5f5f5;
  user-select: none;
  -webkit-user-select: none;
}

/* ── Toolbar ──────────────────────────────────────────── */
#toolbar {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 10px;
  background: linear-gradient(to bottom, #fafafa, #ececec);
  border-bottom: 1px solid #c8c8c8;
  flex-shrink: 0;
}

#toolbar button {
  padding: 4px 14px;
  font-size: 13px;
  border: 1px solid #b0b0b0;
  border-radius: 5px;
  background: linear-gradient(to bottom, #ffffff, #e8e8e8);
  color: #333;
  cursor: pointer;
  white-space: nowrap;
}

#toolbar button:hover {
  background: linear-gradient(to bottom, #f0f0f0, #dcdcdc);
}

#toolbar button:active {
  background: linear-gradient(to bottom, #d8d8d8, #c8c8c8);
}

#toolbar button:disabled {
  opacity: 0.5;
  cursor: default;
}

#folderInput {
  flex: 1;
  padding: 4px 8px;
  font-size: 13px;
  border: 1px solid #b0b0b0;
  border-radius: 5px;
  background: #fff;
  outline: none;
  font-family: inherit;
  min-width: 100px;
}

#folderInput:focus {
  border-color: #5b9bd5;
  box-shadow: 0 0 0 2px rgba(91, 155, 213, 0.25);
}

/* ── Main layout ──────────────────────────────────────── */
#main {
  display: flex;
  flex: 1;
  overflow: hidden;
  min-height: 0;
}

/* ── Left panel ───────────────────────────────────────── */
#leftPanel {
  width: 250px;
  min-width: 250px;
  display: flex;
  flex-direction: column;
  background: #e8e8e8;
  border-right: 1px solid #c0c0c0;
}

#leftPanel .panel-header {
  padding: 8px 10px;
  font-weight: 600;
  font-size: 12px;
  color: #555;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  border-bottom: 1px solid #c8c8c8;
  background: #ddd;
}

#groupList {
  flex: 1;
  overflow-y: auto;
  list-style: none;
}

#groupList li {
  padding: 8px 12px;
  cursor: pointer;
  border-bottom: 1px solid #d4d4d4;
  font-size: 13px;
}

#groupList li:hover {
  background: #d0d0d0;
}

#groupList li.selected {
  background: #3478f6;
  color: #fff;
}

#groupList li.selected:hover {
  background: #2a6ce0;
}

#groupNav {
  display: flex;
  gap: 4px;
  padding: 8px 10px;
  border-top: 1px solid #c8c8c8;
  background: #ddd;
}

#groupNav button {
  flex: 1;
  padding: 4px 10px;
  font-size: 12px;
  border: 1px solid #b0b0b0;
  border-radius: 5px;
  background: linear-gradient(to bottom, #fff, #e8e8e8);
  cursor: pointer;
}

#groupNav button:hover {
  background: linear-gradient(to bottom, #f0f0f0, #dcdcdc);
}

#groupNav button:disabled {
  opacity: 0.5;
  cursor: default;
}

/* ── Right panel ──────────────────────────────────────── */
#rightPanel {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: #fff;
}

#imageArea {
  flex: 1;
  overflow-y: auto;
  padding: 12px 16px;
}

.image-row {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  padding: 12px 0;
}

.image-row + .image-row {
  border-top: 1px solid #e0e0e0;
}

.image-row input[type="checkbox"] {
  margin-top: 4px;
  width: 16px;
  height: 16px;
  flex-shrink: 0;
  cursor: pointer;
  accent-color: #3478f6;
}

.thumb-container {
  width: 250px;
  height: 250px;
  min-width: 250px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #fafafa;
  border: 1px solid #e0e0e0;
  border-radius: 4px;
  overflow: hidden;
}

.thumb-container img {
  max-width: 250px;
  max-height: 250px;
  object-fit: contain;
}

.thumb-placeholder {
  color: #999;
  font-size: 12px;
  font-style: italic;
}

.file-info {
  flex: 1;
  min-width: 0;
}

.file-name {
  font-weight: 600;
  font-size: 14px;
  margin-bottom: 3px;
  word-break: break-all;
}

.file-path {
  color: #888;
  font-size: 12px;
  margin-bottom: 4px;
  word-break: break-all;
}

.file-meta {
  font-size: 12px;
  color: #666;
  margin-bottom: 8px;
}

.file-actions {
  display: flex;
  gap: 6px;
}

.file-actions button {
  padding: 3px 12px;
  font-size: 12px;
  border: 1px solid #b0b0b0;
  border-radius: 4px;
  background: linear-gradient(to bottom, #fff, #eee);
  cursor: pointer;
}

.file-actions button:hover {
  background: linear-gradient(to bottom, #f0f0f0, #ddd);
}

#emptyState {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: #aaa;
  font-size: 15px;
  font-style: italic;
}

/* ── Action bar ───────────────────────────────────────── */
#actionBar {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 12px;
  border-top: 1px solid #d0d0d0;
  background: #f0f0f0;
  flex-shrink: 0;
}

#actionBar button {
  padding: 4px 12px;
  font-size: 12px;
  border: 1px solid #b0b0b0;
  border-radius: 5px;
  background: linear-gradient(to bottom, #fff, #e8e8e8);
  cursor: pointer;
  white-space: nowrap;
}

#actionBar button:hover {
  background: linear-gradient(to bottom, #f0f0f0, #dcdcdc);
}

#actionBar .separator {
  width: 1px;
  height: 22px;
  background: #c0c0c0;
  margin: 0 4px;
}

#btnTrash {
  color: #c05000;
}

#btnDelete {
  background: linear-gradient(to bottom, #f8e0e0, #e8c0c0) !important;
  border-color: #c09090 !important;
  color: #a02020;
}

#btnDelete:hover {
  background: linear-gradient(to bottom, #f0d0d0, #ddb0b0) !important;
}

/* ── Status bar ───────────────────────────────────────── */
#statusBar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 4px 10px;
  border-top: 1px solid #c8c8c8;
  background: #ececec;
  flex-shrink: 0;
  height: 28px;
}

#statusText {
  font-size: 12px;
  color: #555;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  flex: 1;
  margin-right: 12px;
}

#progressContainer {
  width: 200px;
  min-width: 200px;
  height: 14px;
  background: #d8d8d8;
  border-radius: 7px;
  overflow: hidden;
  border: 1px solid #bbb;
}

#progressBar {
  height: 100%;
  width: 0%;
  background: linear-gradient(to bottom, #5ba3f5, #3478f6);
  border-radius: 6px;
  transition: width 0.15s ease;
}

/* ── App container ────────────────────────────────────── */
#app {
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* ── Scrollbar styling ────────────────────────────────── */
::-webkit-scrollbar {
  width: 8px;
}

::-webkit-scrollbar-track {
  background: transparent;
}

::-webkit-scrollbar-thumb {
  background: #c0c0c0;
  border-radius: 4px;
}

::-webkit-scrollbar-thumb:hover {
  background: #a0a0a0;
}
</style>
</head>
<body>

<div id="app">
  <!-- Toolbar -->
  <div id="toolbar">
    <button id="btnChooseFolder">Choose Folder...</button>
    <input type="text" id="folderInput" placeholder="Select a folder to scan for duplicates...">
    <button id="btnScan">Scan</button>
    <button id="btnCancel" disabled>Cancel</button>
  </div>

  <!-- Main area -->
  <div id="main">
    <!-- Left panel: group list -->
    <div id="leftPanel">
      <div class="panel-header">Duplicate Groups</div>
      <ul id="groupList"></ul>
      <div id="groupNav">
        <button id="btnPrev" disabled>&#9664; Prev</button>
        <button id="btnNext" disabled>&#9654; Next</button>
      </div>
    </div>

    <!-- Right panel: image detail -->
    <div id="rightPanel">
      <div id="imageArea">
        <div id="emptyState">Select a folder and scan to find duplicate images.</div>
      </div>
      <div id="actionBar" style="display:none;">
        <button id="btnSelectAllExceptFirst">Select All Except First</button>
        <button id="btnSelectAllExceptLargest">Select All Except Largest</button>
        <button id="btnDeselectAll">Deselect All</button>
        <div class="separator"></div>
        <button id="btnTrash">Move to Trash</button>
        <button id="btnDelete">Delete Permanently</button>
      </div>
    </div>
  </div>

  <!-- Status bar -->
  <div id="statusBar">
    <span id="statusText">Ready</span>
    <div id="progressContainer">
      <div id="progressBar"></div>
    </div>
  </div>
</div>

<script>
(function() {
  // ── State ──────────────────────────────────────────────
  let groups = [];
  let currentGroupIndex = -1;
  let scanning = false;
  let cancelled = false;
  let thumbnailCache = {};

  // ── DOM refs ───────────────────────────────────────────
  const btnChooseFolder = document.getElementById('btnChooseFolder');
  const folderInput = document.getElementById('folderInput');
  const btnScan = document.getElementById('btnScan');
  const btnCancel = document.getElementById('btnCancel');
  const groupListEl = document.getElementById('groupList');
  const btnPrev = document.getElementById('btnPrev');
  const btnNext = document.getElementById('btnNext');
  const imageArea = document.getElementById('imageArea');
  const actionBar = document.getElementById('actionBar');
  const emptyState = document.getElementById('emptyState');
  const btnSelectAllExceptFirst = document.getElementById('btnSelectAllExceptFirst');
  const btnSelectAllExceptLargest = document.getElementById('btnSelectAllExceptLargest');
  const btnDeselectAll = document.getElementById('btnDeselectAll');
  const btnTrash = document.getElementById('btnTrash');
  const btnDelete = document.getElementById('btnDelete');
  const statusText = document.getElementById('statusText');
  const progressBar = document.getElementById('progressBar');

  // ── Tauri API shortcuts ────────────────────────────────
  function invoke(cmd, args) {
    return window.__TAURI__.core.invoke(cmd, args);
  }

  function listen(event, handler) {
    return window.__TAURI__.event.listen(event, handler);
  }

  // ── Choose folder ──────────────────────────────────────
  btnChooseFolder.addEventListener('click', async function() {
    try {
      const selected = await window.__TAURI__.dialog.open({
        directory: true,
        title: 'Select folder to scan'
      });
      if (selected) {
        folderInput.value = selected;
      }
    } catch (e) {
      console.error('Folder dialog error:', e);
    }
  });

  // ── Scan ───────────────────────────────────────────────
  btnScan.addEventListener('click', async function() {
    const folder = folderInput.value.trim();
    if (!folder) {
      setStatus('Please select a folder first.');
      return;
    }

    scanning = true;
    cancelled = false;
    btnScan.disabled = true;
    btnCancel.disabled = false;
    groups = [];
    currentGroupIndex = -1;
    thumbnailCache = {};
    renderGroupList();
    renderImages();
    setStatus('Scanning...');
    setProgress(0);

    try {
      const result = await invoke('scan_folder', { folder: folder });
      if (cancelled) {
        setStatus('Scan cancelled.');
      } else if (result && result.groups && result.groups.length > 0) {
        groups = result.groups;
        setStatus('Found ' + groups.length + ' duplicate group' + (groups.length !== 1 ? 's' : '') + '.');
        renderGroupList();
        selectGroup(0);
      } else {
        groups = [];
        setStatus('No duplicates found.');
        renderGroupList();
        renderImages();
      }
    } catch (e) {
      if (!cancelled) {
        setStatus('Error: ' + (e.message || e));
      } else {
        setStatus('Scan cancelled.');
      }
    } finally {
      scanning = false;
      btnScan.disabled = false;
      btnCancel.disabled = true;
      setProgress(0);
    }
  });

  // ── Cancel ─────────────────────────────────────────────
  btnCancel.addEventListener('click', function() {
    cancelled = true;
    setStatus('Cancelling...');
    // Attempt to invoke a cancel command on the backend
    invoke('cancel_scan').catch(function() {});
  });

  // ── Progress events ────────────────────────────────────
  listen('scan-progress', function(event) {
    const payload = event.payload;
    if (payload.message) {
      setStatus(payload.message);
    }
    if (typeof payload.fraction === 'number') {
      setProgress(payload.fraction);
    }
  });

  // ── Group list ─────────────────────────────────────────
  function renderGroupList() {
    groupListEl.innerHTML = '';
    for (let i = 0; i < groups.length; i++) {
      const li = document.createElement('li');
      li.textContent = 'Group ' + (i + 1) + ' (' + groups[i].files.length + ' files)';
      if (i === currentGroupIndex) {
        li.className = 'selected';
      }
      li.addEventListener('click', (function(idx) {
        return function() { selectGroup(idx); };
      })(i));
      groupListEl.appendChild(li);
    }
    updateNavButtons();
  }

  function selectGroup(index) {
    if (index < 0 || index >= groups.length) return;
    currentGroupIndex = index;
    renderGroupList();
    renderImages();
    // Scroll selected item into view
    var items = groupListEl.querySelectorAll('li');
    if (items[index]) {
      items[index].scrollIntoView({ block: 'nearest' });
    }
  }

  function updateNavButtons() {
    btnPrev.disabled = currentGroupIndex <= 0;
    btnNext.disabled = currentGroupIndex < 0 || currentGroupIndex >= groups.length - 1;
  }

  btnPrev.addEventListener('click', function() {
    if (currentGroupIndex > 0) selectGroup(currentGroupIndex - 1);
  });

  btnNext.addEventListener('click', function() {
    if (currentGroupIndex < groups.length - 1) selectGroup(currentGroupIndex + 1);
  });

  // ── Image rendering ────────────────────────────────────
  function renderImages() {
    imageArea.innerHTML = '';

    if (currentGroupIndex < 0 || currentGroupIndex >= groups.length) {
      actionBar.style.display = 'none';
      var msg = document.createElement('div');
      msg.id = 'emptyState';
      if (groups.length === 0) {
        msg.textContent = 'Select a folder and scan to find duplicate images.';
      } else {
        msg.textContent = 'Select a group from the list.';
      }
      imageArea.appendChild(msg);
      return;
    }

    actionBar.style.display = 'flex';
    var files = groups[currentGroupIndex].files;

    for (var i = 0; i < files.length; i++) {
      var file = files[i];
      var row = document.createElement('div');
      row.className = 'image-row';
      row.dataset.index = i;

      // Checkbox
      var cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.dataset.index = i;
      row.appendChild(cb);

      // Thumbnail
      var thumbContainer = document.createElement('div');
      thumbContainer.className = 'thumb-container';
      var placeholder = document.createElement('span');
      placeholder.className = 'thumb-placeholder';
      placeholder.textContent = '[loading...]';
      thumbContainer.appendChild(placeholder);
      row.appendChild(thumbContainer);

      // Load thumbnail asynchronously
      loadThumbnail(file.path, thumbContainer);

      // File info
      var info = document.createElement('div');
      info.className = 'file-info';

      var nameEl = document.createElement('div');
      nameEl.className = 'file-name';
      nameEl.textContent = file.name;
      info.appendChild(nameEl);

      var pathEl = document.createElement('div');
      pathEl.className = 'file-path';
      pathEl.textContent = file.path;
      info.appendChild(pathEl);

      var metaEl = document.createElement('div');
      metaEl.className = 'file-meta';
      var dims = file.dimensions || 'Unknown';
      var size = file.size || 'Unknown';
      var modified = file.modified || 'Unknown';
      metaEl.textContent = dims + ' | ' + size + ' | Modified: ' + modified;
      info.appendChild(metaEl);

      var actions = document.createElement('div');
      actions.className = 'file-actions';

      var btnOpen = document.createElement('button');
      btnOpen.textContent = 'Open';
      btnOpen.addEventListener('click', (function(p) {
        return function() {
          invoke('open_file', { path: p }).catch(function(e) {
            setStatus('Error opening file: ' + e);
          });
        };
      })(file.path));
      actions.appendChild(btnOpen);

      var btnReveal = document.createElement('button');
      btnReveal.textContent = 'Show in Folder';
      btnReveal.addEventListener('click', (function(p) {
        return function() {
          invoke('reveal_file', { path: p }).catch(function(e) {
            setStatus('Error revealing file: ' + e);
          });
        };
      })(file.path));
      actions.appendChild(btnReveal);

      info.appendChild(actions);
      row.appendChild(info);
      imageArea.appendChild(row);
    }
  }

  async function loadThumbnail(path, container) {
    if (thumbnailCache[path]) {
      setThumbnailImage(container, thumbnailCache[path]);
      return;
    }
    try {
      var dataUrl = await invoke('get_thumbnail', { path: path });
      thumbnailCache[path] = dataUrl;
      setThumbnailImage(container, dataUrl);
    } catch (e) {
      container.innerHTML = '';
      var span = document.createElement('span');
      span.className = 'thumb-placeholder';
      span.textContent = '[no preview]';
      container.appendChild(span);
    }
  }

  function setThumbnailImage(container, dataUrl) {
    container.innerHTML = '';
    var img = document.createElement('img');
    img.src = dataUrl;
    img.alt = 'Thumbnail';
    container.appendChild(img);
  }

  // ── Selection actions ──────────────────────────────────
  function getCheckboxes() {
    return imageArea.querySelectorAll('input[type="checkbox"]');
  }

  btnSelectAllExceptFirst.addEventListener('click', function() {
    var cbs = getCheckboxes();
    for (var i = 0; i < cbs.length; i++) {
      cbs[i].checked = (i !== 0);
    }
  });

  btnSelectAllExceptLargest.addEventListener('click', function() {
    if (currentGroupIndex < 0) return;
    var files = groups[currentGroupIndex].files;
    var largestIdx = 0;
    var largestSize = -1;
    for (var i = 0; i < files.length; i++) {
      if (files[i].size_bytes > largestSize) {
        largestSize = files[i].size_bytes;
        largestIdx = i;
      }
    }
    var cbs = getCheckboxes();
    for (var i = 0; i < cbs.length; i++) {
      cbs[i].checked = (i !== largestIdx);
    }
  });

  btnDeselectAll.addEventListener('click', function() {
    var cbs = getCheckboxes();
    for (var i = 0; i < cbs.length; i++) {
      cbs[i].checked = false;
    }
  });

  // ── Destructive actions ────────────────────────────────
  function getSelectedPaths() {
    var paths = [];
    if (currentGroupIndex < 0) return paths;
    var files = groups[currentGroupIndex].files;
    var cbs = getCheckboxes();
    for (var i = 0; i < cbs.length; i++) {
      if (cbs[i].checked) {
        paths.push(files[i].path);
      }
    }
    return paths;
  }

  function removeDeletedFiles(deletedPaths) {
    var pathSet = {};
    for (var i = 0; i < deletedPaths.length; i++) {
      pathSet[deletedPaths[i]] = true;
    }

    // Remove from current group
    if (currentGroupIndex >= 0 && currentGroupIndex < groups.length) {
      groups[currentGroupIndex].files = groups[currentGroupIndex].files.filter(function(f) {
        return !pathSet[f.path];
      });

      // If group has fewer than 2 files, remove the group
      if (groups[currentGroupIndex].files.length < 2) {
        groups.splice(currentGroupIndex, 1);
        if (groups.length === 0) {
          currentGroupIndex = -1;
        } else if (currentGroupIndex >= groups.length) {
          currentGroupIndex = groups.length - 1;
        }
      }
    }

    // Remove from thumbnail cache
    for (var i = 0; i < deletedPaths.length; i++) {
      delete thumbnailCache[deletedPaths[i]];
    }

    renderGroupList();
    renderImages();
  }

  btnTrash.addEventListener('click', async function() {
    var paths = getSelectedPaths();
    if (paths.length === 0) {
      setStatus('No files selected.');
      return;
    }
    if (!confirm('Move ' + paths.length + ' file' + (paths.length !== 1 ? 's' : '') + ' to Trash?')) {
      return;
    }
    try {
      await invoke('trash_files', { paths: paths });
      setStatus('Moved ' + paths.length + ' file' + (paths.length !== 1 ? 's' : '') + ' to Trash.');
      removeDeletedFiles(paths);
    } catch (e) {
      setStatus('Error moving to trash: ' + (e.message || e));
    }
  });

  btnDelete.addEventListener('click', async function() {
    var paths = getSelectedPaths();
    if (paths.length === 0) {
      setStatus('No files selected.');
      return;
    }
    if (!confirm('PERMANENTLY DELETE ' + paths.length + ' file' + (paths.length !== 1 ? 's' : '') + '?\n\nThis action CANNOT be undone. The files will be permanently removed from disk.')) {
      return;
    }
    try {
      await invoke('delete_files', { paths: paths });
      setStatus('Permanently deleted ' + paths.length + ' file' + (paths.length !== 1 ? 's' : '') + '.');
      removeDeletedFiles(paths);
    } catch (e) {
      setStatus('Error deleting files: ' + (e.message || e));
    }
  });

  // ── Status & progress ─────────────────────────────────
  function setStatus(msg) {
    statusText.textContent = msg;
  }

  function setProgress(fraction) {
    progressBar.style.width = Math.round(fraction * 100) + '%';
  }
})();
</script>
</body>
</html>
